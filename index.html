<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্যাক্টস বাংলাদেশ | সত্য ও যাচাইকৃত সংবাদ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SolaimanLipi', Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; line-height: 1.6; }
        header { background-color: #bd2130; color: white; text-align: center; padding: 30px 10px; }
        nav { background-color: #212529; color: white; text-align: center; padding: 12px; position: sticky; top: 0; z-index: 1000; font-weight: bold; }
        
        .filter-section { background: #fff; padding: 20px; text-align: center; border-bottom: 2px solid #ddd; }
        select { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; min-width: 150px; }
        
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .news-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid #bd2130; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-card h2 { color: #bd2130; margin-bottom: 10px; }
        .news-meta { font-size: 0.8rem; color: #777; margin-bottom: 10px; }
        
        footer { text-align: center; padding: 20px; background: #333; color: white; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>ফ্যাক্টস বাংলাদেশ</h1>
        <p>সত্য ও যাচাইকৃত সংবাদ, সবার আগে</p>
    </header>

    <nav>ফ্যাক্টস বাংলাদেশ নিউজ পোর্টাল</nav>

    <div class="filter-section">
        <select id="division-filter" onchange="updateDistrict()">
            <option value="all">সব বিভাগ</option>
        </select>
        
        <select id="district-filter" onchange="updateThana()">
            <option value="all">সব জেলা</option>
        </select>
        
        <select id="thana-filter" onchange="filterNews()">
            <option value="all">সব থানা</option>
        </select>
    </div>

    <div class="container" id="news-container">
        <div id="loading-text" style="text-align: center; color: #777;">ডাটা লোড হচ্ছে...</div>
        
        <article class="news-card" data-division="ঢাকা বিভাগ" data-district="ঢাকা" data-thana="সাভার">
            <h2>সাভারে যানজট নিরসনে নতুন উদ্যোগ</h2>
            <div class="news-meta">বিভাগ: ঢাকা | জেলা: ঢাকা | থানা: সাভার</div>
            <p>সাভারের যানজট কমাতে ট্রাফিক পুলিশের বিশেষ মহড়া চলছে।</p>
        </article>
    </div>

    <script>
        let globalData = {};

        // data.json ফাইল থেকে ডাটা লোড করার মেইন ফাংশন
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                globalData = data;
                document.getElementById('loading-text').style.display = 'none';
                
                const divisionSelect = document.getElementById('division-filter');
                for (let division in data) {
                    let opt = document.createElement('option');
                    opt.value = division;
                    opt.innerHTML = division;
                    divisionSelect.appendChild(opt);
                }
            })
            .catch(err => {
                document.getElementById('loading-text').innerHTML = "ডাটা লোড করতে সমস্যা হয়েছে।";
                console.error(err);
            });

        // বিভাগ সিলেক্ট করলে জেলা আপডেট হবে
        function updateDistrict() {
            const division = document.getElementById('division-filter').value;
            const districtSelect = document.getElementById('district-filter');
            const thanaSelect = document.getElementById('thana-filter');
            
            districtSelect.innerHTML = '<option value="all">সব জেলা</option>';
            thanaSelect.innerHTML = '<option value="all">সব থানা</option>';
            
            if (division !== 'all' && globalData[division]) {
                for (let district in globalData[division]) {
                    let opt = document.createElement('option');
                    opt.value = district;
                    opt.innerHTML = district;
                    districtSelect.appendChild(opt);
                }
            }
            filterNews();
        }

        // জেলা সিলেক্ট করলে থানা আপডেট হবে
        function updateThana() {
            const division = document.getElementById('division-filter').value;
            const district = document.getElementById('district-filter').value;
            const thanaSelect = document.getElementById('thana-filter');
            
            thanaSelect.innerHTML = '<option value="all">সব থানা</option>';
            
            if (division !== 'all' && district !== 'all' && globalData[division][district]) {
                const thanas = globalData[division][district];
                thanas.forEach(thana => {
                    let opt = document.createElement('option');
                    opt.value = thana;
                    opt.innerHTML = thana;
                    thanaSelect.appendChild(opt);
                });
            }
            filterNews();
        }

        // ফাইনাল ফিল্টারিং ফাংশন
        function filterNews() {
            const division = document.getElementById('division-filter').value;
            const district = document.getElementById('district-filter').value;
            const thana = document.getElementById('thana-filter').value;
            const newsCards = document.getElementsByClassName('news-card');
            
            for (let card of newsCards) {
                const matchDivision = (division === 'all' || card.getAttribute('data-division') === division);
                const matchDistrict = (district === 'all' || card.getAttribute('data-district') === district);
                const matchThana = (thana === 'all' || card.getAttribute('data-thana') === thana);
                
                if (matchDivision && matchDistrict && matchThana) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            }
        }
    </script>

    <footer>&copy; ২০২৬ ফ্যাক্টস বাংলাদেশ। সব স্বত্ব সংরক্ষিত।</footer>

</body>
</html>
